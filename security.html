<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="太极北斗 AI 网关 — 多模型路由、知识库检索、企业级治理">
  <meta name="theme-color" content="#0f1117">
  <title data-i18n="security.title">安全中心</title>
  <link rel="stylesheet" href="console.css">
  <style>
    .page-enter { animation: fadeInUp 0.5s var(--ease-out) both; }
    .score-section { display: flex; align-items: center; gap: var(--space-8); padding: var(--space-7) var(--space-6); margin-bottom: var(--space-7); }
    .score-number { font-family: var(--font-display); font-size: clamp(56px, 8vw, 80px); font-weight: 700; letter-spacing: -3px; line-height: 1; }
    .score-grade { font-family: var(--font-display); font-size: var(--text-title); font-weight: 600; margin-top: var(--space-2); }
    .score-desc { font-size: var(--text-body-sm); color: var(--text-secondary); margin-top: var(--space-3); max-width: 400px; line-height: 1.6; }
    .score-ring { position: relative; width: 140px; height: 140px; flex-shrink: 0; }
    .score-ring svg { transform: rotate(-90deg); width: 140px; height: 140px; }
    .score-ring-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 6; }
    .score-ring-fill { fill: none; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 377; transition: stroke-dashoffset 1.5s var(--ease-smooth); }
    .score-ring-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .checklist-item { display: flex; align-items: center; gap: var(--space-4); padding: var(--space-4) var(--space-5); border-bottom: 1px solid rgba(255,255,255,0.03); }
    .checklist-item:last-child { border-bottom: none; }
    .check-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .check-icon.pass { background: var(--status-success-soft); color: var(--status-success); }
    .check-icon.fail { background: var(--status-danger-soft); color: var(--status-danger); }
    .check-text { flex: 1; font-size: var(--text-body); color: var(--text-secondary); }
    .check-status { font-size: var(--text-caption); color: var(--text-tertiary); flex-shrink: 0; }
    .event-item { display: flex; align-items: flex-start; gap: var(--space-3); padding: var(--space-3) 0; }
    .event-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-tertiary); margin-top: 7px; flex-shrink: 0; }
    .event-text { font-size: var(--text-body-sm); color: var(--text-secondary); line-height: 1.5; }
    .event-time { font-size: var(--text-caption); color: var(--text-tertiary); margin-top: 2px; }
    .btn:active { transform: scale(0.97); }
    @media (max-width: 768px) { .score-section { flex-direction: column; text-align: center; gap: var(--space-5); } }
  </style>
</head>
<body>
  <div id="toast-container" style="position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

  <!-- Sidebar (由共享组件注入) -->


  <main class="main-content page-enter">
    <!-- Demo Mode Banner -->
    <div class="glass-panel glass-panel-static" style="margin-bottom: var(--space-6); border-left: 3px solid var(--status-warning); padding: var(--space-4); display: flex; align-items: center; gap: var(--space-3);">
      <span style="font-size: 20px;">⚠️</span>
      <div>
        <strong style="color: var(--text-primary);">演示模式</strong>
        <span style="color: var(--text-secondary); margin-left: 8px;">此页面显示模拟数据，后端 API 未配置。</span>
      </div>
    </div>

<div class="page-header">
      <div class="page-label" data-i18n="security.label">SECURITY CENTER</div>
      <h1 class="page-title" data-i18n="security.title">安全中心</h1>
      <p class="page-subtitle" data-i18n="security.subtitle">企业级安全治理、实时审计与风险评估</p>
    </div>

    <!-- Section 1: Security Score -->
    <section class="section reveal">
      <div class="glass-panel-static score-section reveal" id="score-section">
        <div class="score-ring">
          <svg viewBox="0 0 140 140">
            <circle class="score-ring-bg" cx="70" cy="70" r="60"/>
            <circle class="score-ring-fill" id="score-ring-fill" cx="70" cy="70" r="60" style="stroke:var(--status-success);stroke-dashoffset:377;"/>
          </svg>
          <div class="score-ring-center">
            <span class="score-number" id="score-value" style="font-size:36px;" data-animate-number="0">--</span>
          </div>
        </div>
        <div>
          <div class="score-grade" id="score-grade" data-i18n="security.scoreHeading">安全评分</div>
          <div class="score-desc" id="score-desc" data-i18n="security.scoreDesc">综合评估基于身份认证、加密、审计覆盖和访问控制四大维度</div>
        </div>
      </div>
    </section>

    <!-- Section 2: Security Checklist -->
    <section class="section reveal">
      <div class="section-header">
        <h2 class="section-title" data-i18n="security.checklistTitle">安全检查</h2>
      </div>
      <div class="glass-panel-static reveal" style="padding:0;overflow:hidden;" id="checklist-panel">
        <div id="checklist-body"></div>
      </div>
    </section>

    <!-- Section 3: Recent Security Events -->
    <section class="section reveal">
      <div class="section-header">
        <h2 class="section-title" data-i18n="security.recentEvents">最近安全事件</h2>
        <span class="section-count" id="event-count">--</span>
      </div>
      <div class="glass-panel-static reveal" style="padding:var(--space-5);">
        <div id="events-body"></div>
      </div>
    </section>
  </main>

  <script src="components/nav.js"></script>
  <script src="components/sidebar.js"></script>

  <script>
  injectSidebar({ activeId: "security" });
  (function() {
    var API = window.location.origin;

    function showToast(msg, type) {
      type = type || 'info';
      var c = document.getElementById('toast-container');
      var colors = { success: '#34d399', error: '#f87171', warning: '#fbbf24', info: '#60a5fa' };
      var el = document.createElement('div');
      el.style.cssText = 'pointer-events:auto;display:flex;align-items:center;gap:10px;padding:12px 20px;border-radius:14px;background:rgba(12,12,18,0.92);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(40px);color:' + colors[type] + ';font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,0.4);transform:translateX(120%);opacity:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);';
      el.textContent = msg;
      c.appendChild(el);
      requestAnimationFrame(function() { el.style.transform = 'translateX(0)'; el.style.opacity = '1'; });
      setTimeout(function() { el.style.transform = 'translateX(120%)'; el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 400); }, 3000);
    }

    function safeFetch(url, opts) {
      return fetch(url, opts).then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      }).catch(function(e) { console.warn('[security]', url, e.message); return null; });
    }

    function timeAgo(ts) {
      if (!ts) return '--';
      var d = new Date(ts);
      var diff = Math.floor((Date.now() - d.getTime()) / 1000);
      if (diff < 60) return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return d.toLocaleDateString();
    }

    function loadSecurityStatus() {
      Promise.all([
        safeFetch(API + '/security/status'),
        safeFetch(API + '/system/info')
      ]).then(function(results) {
        var secData = results[0] || {};
        var sysData = results[1] || {};
        var score = secData.score || secData.securityScore || sysData.securityScore || 92;
        var circumference = 377;
        var offset = circumference - (score / 100) * circumference;

        var ring = document.getElementById('score-ring-fill');
        var valueEl = document.getElementById('score-value');
        var gradeEl = document.getElementById('score-grade');

        var color = 'var(--status-success)';
        var grade = 'A';
        if (score < 60) { color = 'var(--status-danger)'; grade = 'C'; }
        else if (score < 80) { color = 'var(--status-warning)'; grade = 'B'; }

        ring.style.stroke = color;
        ring.style.strokeDashoffset = offset;
        valueEl.textContent = score;
        valueEl.style.color = color;
        gradeEl.textContent = grade + ' - ' + (score >= 80 ? (I18N ? I18N.t('security.scoreHeading') : 'Excellent') : (I18N ? '需要关注' : 'Needs Attention'));

        // Checklist
        var checklist = secData.checklist || [
          { name: I18N ? I18N.t('security.auth') : 'Authentication', pass: true, detail: 'OAuth 2.0 + JWT' },
          { name: I18N ? I18N.t('security.encrypt') : 'Encryption', pass: true, detail: 'TLS 1.3 / AES-256' },
          { name: I18N ? I18N.t('security.auditCov') : 'Audit Coverage', pass: true, detail: '100%' },
          { name: I18N ? I18N.t('security.accessCtrl') : 'Access Control', pass: true, detail: 'RBAC + GVC' },
          { name: 'Rate Limiting', pass: true, detail: 'Configured' },
          { name: 'Input Validation', pass: false, detail: 'Partial coverage' }
        ];

        var body = document.getElementById('checklist-body');
        body.innerHTML = checklist.map(function(c) {
          var iconClass = c.pass ? 'pass' : 'fail';
          var iconChar = c.pass ? '\u2713' : '\u2717';
          var statusText = c.pass ? (I18N ? I18N.t('common.enabled') : 'Pass') : (I18N ? I18N.t('common.disabled') : 'Fail');
          return '<div class="checklist-item">' +
            '<div class="check-icon ' + iconClass + '">' + iconChar + '</div>' +
            '<div class="check-text">' + escapeHtml(c.name || '--') + '</div>' +
            '<div class="check-status">' + escapeHtml(c.detail || '') + '</div>' +
          '</div>';
        }).join('');

        // Events
        var events = secData.events || secData.recentEvents || [
          { text: I18N ? I18N.t('security.event1') : 'System login, auth passed', time: new Date(Date.now() - 120000).toISOString() },
          { text: I18N ? I18N.t('security.event2') : 'Accessed model config', time: new Date(Date.now() - 900000).toISOString() },
          { text: I18N ? I18N.t('security.event3') : 'Updated GVC rules', time: new Date(Date.now() - 3600000).toISOString() },
          { text: I18N ? I18N.t('security.event5') : 'Modified routing config', time: new Date(Date.now() - 7200000).toISOString() },
          { text: I18N ? I18N.t('security.event6') : 'Blocked unauthorized access', time: new Date(Date.now() - 14400000).toISOString() }
        ];

        document.getElementById('event-count').textContent = events.length + ' events';
        var eventsBody = document.getElementById('events-body');
        eventsBody.innerHTML = events.slice(0, 5).map(function(ev) {
          return '<div class="event-item">' +
            '<div class="event-dot"></div>' +
            '<div>' +
              '<div class="event-text">' + escapeHtml(ev.text || ev.message || '--') + '</div>' +
              '<div class="event-time">' + timeAgo(ev.time || ev.timestamp) + '</div>' +
            '</div>' +
          '</div>';
        }).join('');
      });
    }

    loadSecurityStatus();
  })();
  </script>
  <script src="i18n.js"></script>
  <script src="interact.js"></script>
</body>
</html>
