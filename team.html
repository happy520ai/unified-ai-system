<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="team.title">团队成员</title>
  <link rel="stylesheet" href="console.css">
  <style>
    .glass-panel:hover { border-color: var(--glass-border-hover); box-shadow: var(--depth-2); }
    .section-title::before { content: ""; width: 3px; height: 1em; background: linear-gradient(180deg, var(--accent), var(--accent-light, #a78bfa)); border-radius: var(--radius-full); flex-shrink: 0; }
    .page-enter { animation: fadeInUp 0.5s var(--ease-out) both; }
    .status-dot-inline { width: 8px; height: 8px; border-radius: var(--radius-full); display: inline-block; flex-shrink: 0; }
    .status-dot-inline.green { background: var(--status-success); box-shadow: var(--glow-success); }
    .status-dot-inline.yellow { background: var(--status-warning); box-shadow: var(--glow-warning); }
    .status-dot-inline.gray { background: var(--text-tertiary); }
    .member-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-5); }
    .member-card { padding: var(--space-5); transition: all var(--duration-normal) var(--ease-smooth); }
    .member-card:hover { transform: translateY(-2px); }
    .member-top { display: flex; align-items: center; gap: var(--space-4); margin-bottom: var(--space-4); }
    .member-avatar { width: 44px; height: 44px; border-radius: var(--radius-full); background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
    .member-name { font-size: var(--text-body); font-weight: 600; color: var(--text-primary); }
    .member-email { font-size: var(--text-caption); color: var(--text-tertiary); margin-top: 2px; }
    .member-bottom { display: flex; align-items: center; justify-content: space-between; padding-top: var(--space-4); border-top: 1px solid var(--glass-bg-faint); }
    .role-label { font-size: var(--text-caption); font-weight: 500; color: var(--accent); background: var(--accent-soft); padding: 3px 10px; border-radius: var(--radius-full); }
    .btn:active { transform: scale(0.97); }
    .modal-backdrop { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; }
    .modal-backdrop.open { display: flex; }
    .modal-box { background: rgba(12,12,18,0.95); backdrop-filter: var(--glass-blur-heavy); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); box-shadow: var(--depth-3); padding: var(--space-6); max-width: 480px; width: calc(100% - 32px); animation: scaleIn 0.3s var(--ease-spring) both; }
    @media (max-width: 1024px) { .member-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) { .member-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <a href="#page-main" class="skip-link">跳转到主要内容</a>
  <div id="toast-container" role="alert" aria-live="assertive" style="position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

  <!-- Sidebar (由共享组件注入) -->


  <main class="main-content" id="page-main page-enter">
    <!-- Demo Mode Banner -->
    <div class="glass-panel glass-panel-static" style="margin-bottom: var(--space-6); border-left: 3px solid var(--status-warning); padding: var(--space-4); display: flex; align-items: center; gap: var(--space-3);">
      <span style="font-size: 20px;">⚠️</span>
      <div>
        <strong style="color: var(--text-primary);">演示模式</strong>
        <span style="color: var(--text-secondary); margin-left: 8px;">此页面显示模拟数据，后端 API 未配置。</span>
      </div>
    </div>

<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;">
      <div>
        <div class="page-label" data-i18n="team.label">TEAM</div>
        <h1 class="page-title" data-i18n="team.title">团队成员</h1>
        <p class="page-subtitle" data-i18n="team.subtitle">管理团队成员和权限</p>
      </div>
      <button class="btn btn-primary" id="add-member-btn" style="margin-top:8px;" data-i18n="team.inviteMember">添加成员</button>
    </div>

    <!-- Member Cards -->
    <section class="section reveal">
      <div class="member-grid stagger" id="member-grid"></div>
    </section>
  </main>

  <!-- Add Member Modal -->
  <div class="modal-backdrop" id="add-modal">
    <div class="modal-box">
      <h3 class="modal-title" data-i18n="team.inviteMember">添加成员</h3>
      <div class="input-group" style="margin-bottom:var(--space-4);">
        <label class="input-label" data-i18n="team.memberName">姓名</label>
        <input class="input" id="member-name-input" placeholder="Name">
      </div>
      <div class="input-group" style="margin-bottom:var(--space-4);">
        <label class="input-label" data-i18n="team.email">邮箱</label>
        <input class="input" id="member-email-input" placeholder="email@example.com">
      </div>
      <div class="input-group" style="margin-bottom:var(--space-5);">
        <label class="input-label" data-i18n="team.role">角色</label>
        <select class="input" id="member-role-input">
          <option value="admin">Admin</option>
          <option value="developer" selected>Developer</option>
          <option value="viewer">Viewer</option>
        </select>
      </div>
      <div style="display:flex;gap:var(--space-3);justify-content:flex-end;">
        <button class="btn btn-ghost btn-secondary" id="cancel-add-btn" data-i18n="common.cancel">取消</button>
        <button class="btn btn-primary" id="confirm-add-btn" data-i18n="common.add">添加</button>
      </div>
    </div>
  </div>

  <script src="components/nav.js"></script>
  <script src="components/sidebar.js"></script>

  <script>
  injectSidebar({ activeId: "team" });
  (function() {
    var API = window.location.origin;

    function showToast(msg, type) {
      type = type || 'info';
      var c = document.getElementById('toast-container');
      var colors = { success: '#34d399', error: '#f87171', warning: '#fbbf24', info: '#60a5fa' };
      var el = document.createElement('div');
      el.style.cssText = 'pointer-events:auto;display:flex;align-items:center;gap:10px;padding:12px 20px;border-radius:14px;background:rgba(12,12,18,0.92);border:1px solid var(--glass-bg-active);backdrop-filter:blur(40px);color:' + colors[type] + ';font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,0.4);transform:translateX(120%);opacity:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);';
      el.textContent = msg;
      c.appendChild(el);
      requestAnimationFrame(function() { el.style.transform = 'translateX(0)'; el.style.opacity = '1'; });
      setTimeout(function() { el.style.transform = 'translateX(120%)'; el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 400); }, 3000);
    }

    function safeFetch(url, opts) {
      return fetch(url, opts).then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      }).catch(function(e) { console.warn('[team]', url, e.message); return null; });
    }

    function timeAgo(ts) {
      if (!ts) return '--';
      var d = new Date(ts);
      var diff = Math.floor((Date.now() - d.getTime()) / 1000);
      if (diff < 60) return 'Just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return d.toLocaleDateString();
    }

    var modal = document.getElementById('add-modal');
    document.getElementById('add-member-btn').addEventListener('click', function() { modal.classList.add('open'); });
    document.getElementById('cancel-add-btn').addEventListener('click', function() { modal.classList.remove('open'); });
    modal.addEventListener('click', function(e) { if (e.target === modal) modal.classList.remove('open'); });

    document.getElementById('confirm-add-btn').addEventListener('click', function() {
      var name = document.getElementById('member-name-input').value.trim();
      var email = document.getElementById('member-email-input').value.trim();
      var role = document.getElementById('member-role-input').value;
      if (!name || !email) { showToast(I18N ? I18N.t('common.noData') : 'Please fill all fields', 'warning'); return; }
      safeFetch(API + '/enterprise/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, email: email, role: role })
      }).then(function() {
        modal.classList.remove('open');
        showToast(I18N ? I18N.t('common.success') : 'Member added', 'success');
        loadMembers();
      });
    });

    var fallbackMembers = [
      { name: 'Alice Chen', email: 'alice@example.com', role: 'admin', status: 'online', lastActive: new Date(Date.now() - 120000).toISOString() },
      { name: 'Bob Wang', email: 'bob@example.com', role: 'developer', status: 'online', lastActive: new Date(Date.now() - 900000).toISOString() },
      { name: 'Carol Li', email: 'carol@example.com', role: 'developer', status: 'away', lastActive: new Date(Date.now() - 3600000).toISOString() },
      { name: 'David Zhang', email: 'david@example.com', role: 'viewer', status: 'online', lastActive: new Date(Date.now() - 300000).toISOString() },
      { name: 'Eva Liu', email: 'eva@example.com', role: 'admin', status: 'offline', lastActive: new Date(Date.now() - 86400000).toISOString() },
      { name: 'Frank Wu', email: 'frank@example.com', role: 'developer', status: 'online', lastActive: new Date(Date.now() - 60000).toISOString() }
    ];

    function renderMembers(members) {
      var grid = document.getElementById('member-grid');
      var list = members || fallbackMembers;
      grid.innerHTML = list.map(function(m, i) {
        var letter = (m.name || '?').charAt(0).toUpperCase();
        var statusClass = m.status === 'online' ? 'green' : (m.status === 'away' ? 'yellow' : 'gray');
        var roleColors = { admin: 'var(--accent)', developer: 'var(--status-info)', viewer: 'var(--text-tertiary)' };
        return '<div class="glass-card member-card animate-fade-in-up" style="animation-delay:' + (i * 60) + 'ms">' +
          '<div class="member-top">' +
            '<div class="member-avatar">' + escapeHtml(letter) + '</div>' +
            '<div>' +
              '<div class="member-name">' + escapeHtml(m.name || '--') + '</div>' +
              '<div class="member-email">' + escapeHtml(m.email || '--') + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="member-bottom">' +
            '<span class="role-label" style="color:' + (roleColors[m.role] || 'var(--text-tertiary)') + ';background:' + (roleColors[m.role] || 'var(--text-tertiary)') + '18;">' + escapeHtml(m.role || '--') + '</span>' +
            '<div style="display:flex;align-items:center;gap:6px;">' +
              '<span class="status-dot-inline ' + statusClass + '"></span>' +
              '<span style="font-size:var(--text-caption);color:var(--text-tertiary);">' + timeAgo(m.lastActive) + '</span>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function loadMembers() {
      safeFetch(API + '/enterprise/users').then(function(data) {
        var list = null;
        if (data && Array.isArray(data)) list = data;
        else if (data && data.users) list = data.users;
        else if (data && data.members) list = data.members;
        renderMembers(list);
      });
    }

    renderMembers();
    loadMembers();
  })();
  </script>
  <script src="i18n.js"></script>
  <script src="interact.js"></script>
</body>
</html>
